<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CrimsonCellar Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-black dark:text-white">

  
  <div class="flex justify-between items-center p-4">
    <h1 class="text-2xl font-bold text-red-600">🍷 CrimsonCellar Vault</h1>
    <button id="theme-toggle" class="px-3 py-1 bg-black text-white dark:bg-white dark:text-black rounded">
      Toggle Theme
    </button>
  </div>

  
  <div class="flex gap-10 justify-center text-lg">
    <p>Wines: <span id="total-wines">0</span></p>
    <p>Bottles: <span id="total-bottles">0</span></p>
  </div>

  
  <div class="flex gap-2 justify-center mt-4">
    <input id="wine-name" placeholder="Wine name" class="p-2 rounded border">
    <input id="wine-qty" type="number" placeholder="Qty" class="p-2 rounded border w-20">
    <input id="wine-image" placeholder="Image URL" class="p-2 rounded border">
    <button id="add-btn" class="bg-red-500 text-white px-4 rounded">Add</button>
  </div>

  
  <div class="flex justify-center mt-4">
    <input id="search" placeholder="Search wine..." class="p-2 w-1/2 rounded border">
  </div>

  
  <div class="grid grid-cols-3 gap-4 p-4">
    <div>
      <h2 class="text-green-500 font-bold">In Stock</h2>
      <div id="in-stock" class="flex flex-col gap-2"></div>
    </div>

    <div>
      <h2 class="text-yellow-500 font-bold">Low Stock</h2>
      <div id="low-stock" class="flex flex-col gap-2"></div>
    </div>

    <div>
      <h2 class="text-red-500 font-bold">Out of Stock</h2>
      <div id="out-stock" class="flex flex-col gap-2"></div>
    </div>
  </div>

  
  <div class="w-2/3 mx-auto mt-6">
    <canvas id="wineChart"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
