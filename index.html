<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crimson Cellar Inventory</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="script.js"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen">

  <h1 class="text-3xl font-bold text-center mt-6 text-red-800">
    🍷 Crimson Cellar Inventory
  </h1>

  <!-- Analytics -->
  <div class="flex flex-wrap justify-center gap-4 mt-4">
    <div class="bg-white/70 backdrop-blur p-4 rounded-2xl shadow text-center w-32">
      <p class="text-sm">Wines</p>
      <h2 id="totalWines" class="text-xl font-bold">0</h2>
    </div>

    <div class="bg-white/70 backdrop-blur p-4 rounded-2xl shadow text-center w-32">
      <p class="text-sm">Bottles</p>
      <h2 id="totalQty" class="text-xl font-bold">0</h2>
    </div>
  </div>

  <!-- Search -->
  <div class="flex justify-center mt-6 px-4">
    <input id="searchInput" onkeyup="renderWines()" placeholder="🔍 Search wine..."
      class="border p-2 rounded w-full max-w-md shadow">
  </div>

  <!-- Input -->
  <div class="flex flex-wrap justify-center mt-4 gap-2 px-4">
    <input id="wineName" placeholder="Wine name"
      class="border p-2 rounded shadow">

    <input id="wineQty" type="number" placeholder="Qty"
      class="border p-2 rounded w-20 shadow">

    <input id="wineImg" placeholder="Image URL"
      class="border p-2 rounded w-full max-w-xs shadow">

    <button onclick="addWine()"
      class="bg-red-700 hover:bg-red-800 text-white px-4 rounded shadow">
      Add
    </button>
  </div>

  <!-- Board -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-6">

    <div class="bg-white/60 backdrop-blur p-4 rounded-2xl shadow"
      ondrop="drop(event,'instock')" ondragover="allowDrop(event)">
      <h2 class="font-bold mb-2 text-green-600">In Stock</h2>
      <div id="instock"></div>
    </div>

    <div class="bg-white/60 backdrop-blur p-4 rounded-2xl shadow"
      ondrop="drop(event,'lowstock')" ondragover="allowDrop(event)">
      <h2 class="font-bold mb-2 text-yellow-600">Low Stock</h2>
      <div id="lowstock"></div>
    </div>

    <div class="bg-white/60 backdrop-blur p-4 rounded-2xl shadow"
      ondrop="drop(event,'outofstock')" ondragover="allowDrop(event)">
      <h2 class="font-bold mb-2 text-red-600">Out of Stock</h2>
      <div id="outofstock"></div>
    </div>

  </div>

</body>
</html>
