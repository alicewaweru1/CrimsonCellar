<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Cellar | Inventory  </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-rose-950 text-rose-50 transition-colors duration-300">
    <nav class="flex justify-between items-center p-6 border-b border-red-900 bg-zinc-900 shadow-md backdrop-blur-md sticky top-0 z-50">
        <div class="text-2xl font-serif font-bold text-red-600">Crimson Cellar</div>
        <div class="flex gap-8 items-center">
            <a href="index.html" class="hover:text-red-500 transition border-b-2 border-red-600">Home</a>
            <a href="inventory.html" class="hover:text-red-500 transition">Inventory</a>
            <a href="analytics.html" class="hover:text-red-500 transition">Analytics</a>
            <button id="themeToggle" class="p-2 rounded-full bg-slate-800 hover:bg-rose-900 transition">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>


    <div id="alertBanner" class="hidden bg-red-600 text-white p-2 text-center font-bold">
        ⚠️ ATTENTION: Low stock detected in your cellar!
    </div>

    <main class="max-w-6xl mx-auto mt-10 px-6">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-4xl font-serif">Cellar Inventory</h1>
                <p class="text-zinc-400 mt-2">Total Value: <span class="text-red-500 font-bold" id="totalValue">$0</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-zinc-900 p-4 rounded-xl">
            <input type="text" id="searchInput" placeholder="Search wine name..." class="bg-zinc-800 border-none rounded p-3 focus:ring-2 ring-red-600 outline-none">
            <select id="filterCategory" class="bg-zinc-800 border-none rounded p-3 focus:ring-2 ring-red-600 outline-none">
                <option value="">All Categories</option>
                <option value="Red">Red</option>
                <option value="White">White</option>
                <option value="Sparkling">Sparkling</option>
                <option value="Dessert">Dessert</option>
            </select>
        </div>

        <form id="wineForm" class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-10 items-end">
            <div>
                <label class="block text-sm mb-1 text-zinc-500">Wine Name</label>
                <input type="text" id="wineName" required class="w-full bg-zinc-900 border border-zinc-800 rounded p-2">
            </div>
            <div>
                <label class="block text-sm mb-1 text-zinc-500">Category</label>
                <select id="wineCategory" required class="w-full bg-zinc-900 border border-zinc-800 rounded p-2">
                    <option value="Red">Red</option>
                    <option value="White">White</option>
                    <option value="Sparkling">Sparkling</option>
                    <option value="Dessert">Dessert</option>
                </select>
            </div>
            <div>
                <label class="block text-sm mb-1 text-zinc-500">Quantity</label>
                <input type="number" id="wineQty" required class="w-full bg-zinc-900 border border-zinc-800 rounded p-2">
            </div>
            <div>
                <label class="block text-sm mb-1 text-zinc-500">Price ($)</label>
                <input type="number" id="winePrice" required class="w-full bg-zinc-900 border border-zinc-800 rounded p-2">
            </div>
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded transition">Add Wine</button>
        </form>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-zinc-900 text-zinc-500 text-sm uppercase">
                    <tr>
                        <th class="p-4">Wine</th>
                        <th class="p-4">Category</th>
                        <th class="p-4">Quantity</th>
                        <th class="p-4">Price</th>
                        <th class="p-4 text-left min-w-[120px]">Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable">
                    </tbody>
            </table>
        </div>
    </main>
<footer class="w-full bg-zinc-900 mt-20 py-12 border-t border-zinc-800">
  <div class="max-w-7xl mx-auto px-4 text-center">
    <p class="text-zinc-500 text-sm tracking-wide">
      &copy; 2026 <span class="text-zinc-300 font-medium">Crimson Cellar</span>. All rights reserved.
    </p>
  </div>
</footer>
    <script src="script.js"></script>
</body>
</html>
